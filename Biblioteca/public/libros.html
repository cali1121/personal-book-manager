<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Listado de Libros</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="catalogo">
    <h2>Explora el catálogo de libros</h2>
    <div class="busqueda">
        <input type="text" id="buscador-libros" class="buscador" placeholder="Buscar libro por título...">
    </div>
    <table class="libros-table">
        <thead>
            <tr>
                <th>Título</th>
                <th>Autor</th>
                <th>Género</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-libros">
        </tbody>
    </table>
</div>
<script src="scripts.js"></script>
</body>
</html>
